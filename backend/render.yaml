      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: sb_publishable_oNmEOymvuM5qoUsL9Z2RXA_WDfqoBq2
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
